# Example daily public market brief config.
# API keys are read from environment variables named in required_env_vars.

watchlist = ["ASX 200", "AUD", "BHP", "DGS10", "USD"]

[regions]
primary_region = "AU"
timezone = "Australia/Perth"
regions = ["AU", "US", "global"]

[ingestion]
cache_path = "../.cache/daily-brief-items.jsonl"
lookback_hours = 36

[llm]
backend = "placeholder"

[output]
json = "../outputs/daily-brief.json"
markdown = "../outputs/daily-brief.md"
html = "../outputs/daily-brief.html"
text = "../outputs/daily-brief.txt"
email_dry_run = "../outputs/daily-brief.eml"

[email]
sender = "briefs@example.test"
recipients = ["reader@example.test"]
subject_prefix = "Daily Market Brief"

[[sources]]
source_id = "local-market-fixture"
display_name = "Local Market Fixture"
enabled = true
kind = "local_fixture"
category = "user_provided"
fixture_path = "daily_market_items.jsonl"
terms_notes = "Local development fixture. Replace with permitted APIs, feeds, or exports."

[[sources]]
source_id = "gdelt-api"
display_name = "GDELT DOC API"
enabled = false
kind = "json_api"
category = "news_commentary"
endpoint_url = "https://api.gdeltproject.org/api/v2/doc/doc"
terms_notes = "Public API metadata and links only; do not republish third-party articles."
rate_limit_notes = "Use narrow queries and cache responses."

[[sources]]
source_id = "newsapi"
display_name = "NewsAPI"
enabled = false
kind = "json_api"
category = "news_commentary"
endpoint_url = "https://newsapi.org/v2/everything"
required_env_vars = ["NEWSAPI_KEY"]
terms_notes = "Credentialed news API. Use only within plan and licence terms."
terms_url = "https://newsapi.org/terms"
